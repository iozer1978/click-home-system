<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות - Click Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root { --brand-brown: #8B5A2B; --brand-olive: #6B705C; --bg-cream: #F5F1E8; }
        body { font-family: 'Heebo', sans-serif; margin: 0; background-color: var(--bg-cream); display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 60px; margin-bottom: 20px; }
        h1 { color: var(--brand-brown); font-weight: 900; margin-bottom: 30px; font-size: 28px; }
        
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; color: #555; }
        .form-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 50px; font-family: 'Heebo'; font-size: 16px; box-sizing: border-box; transition: 0.2s; background: #f9f9f9; }
        .form-input:focus { border-color: var(--brand-brown); background: white; outline: none; }
        
        .btn-submit { background: var(--brand-brown); color: white; border: none; padding: 12px; width: 100%; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-submit:hover { background: #6f4721; }
        
        .links { margin-top: 20px; font-size: 14px; color: #777; }
        .links a { color: var(--brand-brown); text-decoration: none; font-weight: bold; }
        
        .error-msg { background: #ffebee; color: #c62828; padding: 10px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="/media/logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
        <h1>כניסה לאזור האישי</h1>

        {% if form.errors %}
        <div class="error-msg">
            <i class="fas fa-exclamation-circle"></i> שם המשתמש או הסיסמה שגויים.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">שם משתמש</label>
                <input type="text" name="username" class="form-input" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">סיסמה</label>
                <input type="password" name="password" class="form-input" required>
            </div>
            <button type="submit" class="btn-submit">התחברות</button>
        </form>

        <div class="links">
            עדיין אין לך חשבון? <a href="{% url 'register' %}">הרשמה מהירה כאן</a><br><br>
            <a href="{% url 'home' %}" style="color:#999; font-weight:normal;">&larr; חזרה לדף הבית</a>
        </div>
    </div>

</body>
</html>
