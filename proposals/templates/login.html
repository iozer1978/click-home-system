<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>התחברות - Click Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background: #F5F1E8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 6px solid #8B5A2B; }
        h2 { color: #8B5A2B; margin-bottom: 20px; font-weight: 900; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-family: 'Heebo'; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #8B5A2B; color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #6f4721; }
        .links { margin-top: 20px; font-size: 14px; }
        a { color: #6B705C; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-box">
        <img src="/media/logo.png" style="height: 50px; margin-bottom: 10px;">
        <h2>כניסה לאזור אישי</h2>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="שם משתמש" required>
            <input type="password" name="password" placeholder="סיסמה" required>
            <button type="submit">התחבר</button>
        </form>
        <div class="links">
            אין לך עדיין חשבון? <a href="{% url 'register' %}">הרשם כאן</a>
            <br><br>
            <a href="{% url 'home' %}">חזרה לדף הבית</a>
        </div>
    </div>
</body>
</html>
