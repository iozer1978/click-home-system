{% load static %}
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>קטלוג טאבלט | Click Home</title>
    <meta name="description" content="קטלוג טאבלט יוקרתי של Click Home">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/tab_tinder.css' %}">
</head>
<body {% if messages or lead_form.full_name or lead_form.phone or lead_form.email or lead_form.message %}data-open-quote-modal="true"{% endif %}>

    <main class="tab-page" id="tabletCatalogPage">
        <section class="tablet-shell">
            <header class="tablet-header">
                <div class="tablet-logo">
                    <img src="/media/logo.png" alt="Click Home" onerror="this.style.display='none'">
                </div>
                <h1 id="currentHouseTitle">בית מודולרי יוקרתי - דגם כרמל</h1>
                <div class="tablet-header-spacer"></div>
            </header>

            <section class="gallery-section hero-wrapper">
                <div class="hero-stage hero" id="heroStage">
                    <button type="button" class="hero-arrow hero-prev" id="heroPrevBtn" aria-label="תמונה קודמת">‹</button>
                    <img id="heroImage" class="hero-image" src="" alt="">
                    <div class="thumb-strip" id="heroThumbs"></div>
                    <button type="button" class="hero-arrow hero-next" id="heroNextBtn" aria-label="תמונה הבאה">›</button>
                    <div class="hero-dots" id="heroDots"></div>
                </div>
            </section>

            <section class="specs-actions-row">
                <article class="dimensions-card" id="houseDimensionsCard">
                    <h3>מפרט ומידות</h3>
                    <div class="dim-lines">
                        <p id="dimArea">שטח בנוי: -- מ"ר</p>
                        <p id="dimLength">אורך: -- מ'</p>
                        <p id="dimWidth">רוחב: -- מ'</p>
                    </div>
                    <button type="button" class="floorplan-link" id="floorplanQuickBtn">שרטוט הבית</button>
                </article>

                <div class="spec-icons-row" id="specIconsRow"></div>

                <aside class="action-buttons">
                    <button type="button" id="requestQuoteBtn" class="btn btn-primary">קבל הצעת מחיר</button>
                    <button type="button" id="openDetailsBtn" class="btn btn-secondary">פרטים מלאים</button>
                    <button type="button" id="openFloorplanBtn" class="btn btn-outline">שרטוט הבית</button>
                </aside>
            </section>

            <section class="house-selector-wrap">
                <div class="house-selector-track" id="houseSelectorTrack"></div>
            </section>
        </section>

    </main>

    <button id="filterDrawerTrigger" class="filter-fab" type="button" aria-expanded="false" aria-controls="sideFilterPanel">סינון</button>
    <div id="filterOverlay" class="filter-overlay" hidden></div>
    <aside id="sideFilterPanel" class="side-filter-panel" aria-hidden="true">
        <header class="panel-header">
            <h2>סינון בתים</h2>
            <button type="button" id="closeFilterPanelBtn" aria-label="סגור סינון">✕</button>
        </header>
        <div class="panel-body">
            <label>סוג בית
                <select id="filterType"></select>
            </label>
            <label>חדרי שינה
                <select id="filterBedrooms"></select>
            </label>
            <label>חדר מגורים
                <select id="filterLivingRoom"></select>
            </label>
            <label>חדרי רחצה
                <select id="filterBathrooms"></select>
            </label>
            <label>שירותים
                <select id="filterToilets"></select>
            </label>
            <label>חניה
                <select id="filterParking"></select>
            </label>
            <label>מטבח
                <select id="filterKitchen"></select>
            </label>
            <label>מדרגות
                <select id="filterStairs"></select>
            </label>
            <div class="range-wrap">
                <label>שטח מינימום (מ"ר)
                    <input id="filterAreaMin" type="range" min="0" max="300" step="5" value="0">
                </label>
                <output id="filterAreaMinOut">0</output>
            </div>
            <div class="range-wrap">
                <label>שטח מקסימום (מ"ר)
                    <input id="filterAreaMax" type="range" min="0" max="300" step="5" value="300">
                </label>
                <output id="filterAreaMaxOut">300</output>
            </div>
        </div>
        <footer class="panel-footer">
            <button type="button" id="resetFiltersBtn" class="btn btn-outline">אפס סינון</button>
            <button type="button" id="applyAndCloseFiltersBtn" class="btn btn-primary">סגור</button>
        </footer>
    </aside>

    <div id="houseDetailsModal" class="details-modal" hidden>
        <div class="details-backdrop" data-close-details></div>
        <section class="details-dialog" role="dialog" aria-modal="true" aria-labelledby="detailsModalTitle">
            <button type="button" class="details-close" id="detailsModalCloseBtn" aria-label="סגור">✕</button>
            <h3 id="detailsModalTitle"></h3>
            <img id="detailsModalImage" src="" alt="">
            <p id="detailsModalDescription"></p>
            <div id="detailsModalSpecs" class="details-specs"></div>
            <div id="detailsModalFeatures" class="details-features"></div>
            <button type="button" id="detailsModalCtaBtn" class="btn btn-primary">קבל הצעת מחיר</button>
        </section>
    </div>

    <div id="floorplanModal" class="details-modal" hidden>
        <div class="details-backdrop" data-close-floorplan></div>
        <section class="details-dialog floorplan-only-dialog" role="dialog" aria-modal="true" aria-labelledby="floorplanModalTitle">
            <button type="button" class="details-close" id="floorplanModalCloseBtn" aria-label="סגור">✕</button>
            <h3 id="floorplanModalTitle">שרטוט הבית</h3>
            <img id="floorplanModalImage" src="" alt="שרטוט הבית">
        </section>
    </div>

    <div id="quoteModal" class="details-modal" hidden>
        <div class="details-backdrop" data-close-quote></div>
        <section class="details-dialog quote-dialog" role="dialog" aria-modal="true" aria-labelledby="quoteModalTitle">
            <button type="button" class="details-close" id="quoteModalCloseBtn" aria-label="סגור">✕</button>
            <h3 id="quoteModalTitle">קבל הצעת מחיר</h3>
            {% if messages %}
                <div class="form-messages">
                    {% for message in messages %}
                        <p class="message {{ message.tags }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
            <form method="POST" class="lead-form-grid">
                {% csrf_token %}
                <input type="hidden" name="model_name" id="leadModelName" value="{{ lead_form.model_name|default:'' }}">
                <input type="text" name="full_name" placeholder="שם מלא" value="{{ lead_form.full_name }}" required>
                <input type="tel" name="phone" placeholder="טלפון" value="{{ lead_form.phone }}" required>
                <input type="email" name="email" placeholder="אימייל" value="{{ lead_form.email }}">
                <select name="interest_type" required>
                    <option value="">סוג נכס מעניין אותי</option>
                    <option value="בתים פרטיים" {% if lead_form.interest_type == "בתים פרטיים" %}selected{% endif %}>בתים פרטיים</option>
                    <option value="בתים מודולריים" {% if lead_form.interest_type == "בתים מודולריים" %}selected{% endif %}>בתים מודולריים</option>
                    <option value="ADU" {% if lead_form.interest_type == "ADU" %}selected{% endif %}>ADU</option>
                </select>
                <textarea name="message" rows="3" placeholder="הודעה" required>{{ lead_form.message }}</textarea>
                <button type="submit">שלחו לי פרטים</button>
            </form>
        </section>
    </div>

    <script id="tabModelsData" type="application/json">{{ all_models_json|safe }}</script>
    <script src="{% static 'js/tab_tinder.js' %}" defer></script>
</body>
</html>
