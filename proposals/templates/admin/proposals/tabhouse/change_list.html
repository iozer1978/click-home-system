{% extends "admin/change_list.html" %}

{% block object-tools-items %}
  <li>
    <a id="refresh-tabhouses-btn" href="{{ refresh_from_source_url }}" class="addlink" style="background:#8b5a2b;">
      רענון מהמקור (לחיצה אחת)
    </a>
  </li>
  {{ block.super }}
{% endblock %}

{% block extrahead %}
  {{ block.super }}
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const refreshBtn = document.getElementById("refresh-tabhouses-btn");
      if (!refreshBtn) return;
      refreshBtn.addEventListener("click", function () {
        refreshBtn.textContent = "טוען... מעדכן דגמים";
        refreshBtn.style.pointerEvents = "none";
        refreshBtn.style.opacity = "0.75";
      });
    });
  </script>
{% endblock %}
