<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSQ Admin Login</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f2f5f8; }
        .wrap { min-height: 100vh; display: grid; place-items: center; }
        .card { width: min(420px, 92vw); background: #fff; border: 1px solid #dce3ea; border-radius: 14px; padding: 24px; }
        h1 { margin-top: 0; }
        label { display: block; margin-bottom: 8px; color: #4d5a67; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #d5dde5; border-radius: 10px; }
        button { margin-top: 14px; width: 100%; border: 0; background: #8b5a2b; color: #fff; border-radius: 10px; padding: 10px 12px; }
        .errorlist { color: #9d3030; }
        .messages { color: #9d3030; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="wrap">
        <form class="card" method="post">
            {% csrf_token %}
            <h1>Supplier Dashboard Login</h1>
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}<div>{{ message }}</div>{% endfor %}
                </div>
            {% endif %}
            <label for="{{ form.password.id_for_label }}">Admin password</label>
            {{ form.password }}
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
